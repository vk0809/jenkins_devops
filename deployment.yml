apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp-deploy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:   # ✅ Correct position
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp-container
        image: myapp:latest
        ports:
        - containerPort: 5000
