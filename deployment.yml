
apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp-deploy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

    template:
      metadata:
        labels:
          app: myapp

      spec:
        containerPort:
        - name: myapp-container
          image: vk0908/myapp:latest
          ports:
          - containerPort: 5000


